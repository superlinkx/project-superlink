version: '3.8'

services:
  # 1. The Go Backend (The Gatekeeper & Dispatcher)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - HERMES_API_URL=http://hermes:8642/v1
      - HERMES_API_KEY=${HERMES_SECRET_KEY}
    networks:
      - superlink_net
    depends_on:
      - hermes

  # 2. Local Inference Engine (Gemma via Ollama - AMD ROCm Rootless)
  inference:
    image: docker.io/ollama/ollama:rocm 
    container_name: inference
    restart: unless-stopped
    userns_mode: keep-id
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    security_opt:
      - seccomp=unconfined
      - label=disable
    environment:
      - OLLAMA_FLASH_ATTENTION=true
    volumes:
      # Updated internal path for the ROCm image
      - ./docker/inference-data:/home/ubuntu/.ollama:z
    ports:
      - "11434:11434"
    networks:
      - superlink_net

  # 3. Hermes Agent (The Autonomous Personality)
  hermes:
    build:
      context: ./docker
      dockerfile: hermes.Dockerfile
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    # Forces the container user to match your host user, granting GPU device access
    userns_mode: keep-id:uid=10000,gid=10000
    volumes:
      - ./docker/hermes-data:/opt/data:z
    env_file:
      - .env
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_KEY=${HERMES_SECRET_KEY}
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642

      # --- Explicitly define the Hermes Provider and Model ---
      - HERMES_PROVIDER=openai
      - HERMES_MODEL=gemma4:26b

      # --- Route the OpenAI traffic to our local Ollama container ---
      - OPENAI_BASE_URL=http://inference:11434/v1
      - OPENAI_API_KEY=ollama

      - WEBHOOK_URL=http://backend:8080/hermes/webhook
    networks:
      - superlink_net
    depends_on:
      - inference

  # 4. Hermes Agent Dashboard (For Observability & Control)
  dashboard:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: dashboard --host 0.0.0.0 --insecure
    ports:
      - "9119:9119"
    # Forces the container user to match your host user, granting GPU device access
    userns_mode: keep-id:uid=10000,gid=10000
    volumes:
      - ./docker/hermes-data:/opt/data:z
    environment:
      - GATEWAY_HEALTH_URL=http://hermes:8642
    depends_on:
      - hermes
    networks:
      - superlink_net
    
networks:
  superlink_net:
    driver: bridge