version: '3.8'

services:
  # 1. The Go Backend (The Gatekeeper & Dispatcher)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - HERMES_API_URL=http://hermes:8642/v1
      - HERMES_API_KEY=${HERMES_SECRET_KEY}
    networks:
      - superlink_net
    depends_on:
      - hermes

  # 2. Local Inference Engine (Gemma via Ollama - AMD ROCm Rootless)
  inference:
    image: docker.io/ollama/ollama:rocm 
    container_name: inference
    restart: unless-stopped
    # Forces the container user to match your host user, granting GPU device access
    userns_mode: keep-id
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    security_opt:
      - seccomp=unconfined
      - label=disable # Disables SELinux separation for GPU memory mapping if needed
    environment:
      - OLLAMA_FLASH_ATTENTION=true
    volumes:
      # Note the :z flag for rootless SELinux volume relabeling
      - ./inference-data:/root/.ollama:z
    networks:
      - superlink_net

# 3. Hermes Agent (The Autonomous Personality)
  hermes:
    image: docker.io/nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    volumes:
      - ./hermes-data:/opt/data:z 
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_KEY=${HERMES_SECRET_KEY}
      
      - OPENAI_BASE_URL=http://inference:11434/v1
      - OPENAI_API_KEY=dummy-key
      
      # --- Explicitly define the Gemma 4 26B A4B model ---
      - MODEL_NAME=gemma4:26b-a4b 
      
      - WEBHOOK_URL=http://backend:8080/hermes/webhook
      - FIRECRAWL_API_URL=http://firecrawl:3000
    networks:
      - superlink_net
    depends_on:
      - inference
  # 4. Firecrawl (External Web Capabilities)
  firecrawl:
    image: docker.io/mendableai/firecrawl:latest
    container_name: firecrawl
    restart: unless-stopped
    networks:
      - superlink_net
      
  # 5. Lightweight API Initialization Script
  init-inference:
    image: docker.io/curlimages/curl:latest # A tiny ~10MB image instead of a 5GB ROCm image
    container_name: init-inference
    networks:
      - superlink_net
    depends_on:
      - inference
    # Execute a standard shell script using curl to talk to the Ollama REST API
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      echo 'Waiting for local inference engine to wake up...';
      while ! curl -s http://inference:11434/api/tags > /dev/null; do
        sleep 2;
      done;
      
      echo 'Inference engine ready. Commanding API to pull Gemma 4 26B A4B (This will take a while)...';
      
      # The 'stream: false' parameter ensures this curl command blocks until the download is completely finished
      curl -s -X POST http://inference:11434/api/pull -d '{\"name\": \"gemma4:26b-a4b\", \"stream\": false}';
      
      echo '\nModel pull complete! Init container shutting down.'
      "

networks:
  superlink_net:
    driver: bridge